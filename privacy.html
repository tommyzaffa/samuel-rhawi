        sections: [
          ['Responsable du site', ['Samuel Rhawi by Nursel, Via Giuseppe Motta 7, 6900 Lugano, Suisse. Deuxieme adresse : Via Cantonale, 6916 Grancia, Suisse. Contact : <a href="tel:+41766934737">+41 76 693 47 37</a>.']],
          ['Donnees traitees', ['Ce site est un site vitrine statique pour la boutique. Il ne propose pas de comptes utilisateurs, paniers en ligne, paiements, newsletter ou outils de profilage. Lors de la navigation, des donnees techniques necessaires au fonctionnement du site peuvent etre traitees, comme l&apos;adresse IP, le navigateur, l&apos;appareil, la date et l&apos;heure de la requete, via les journaux habituels du fournisseur d&apos;hebergement.', 'Si vous contactez la boutique par telephone, WhatsApp, Instagram ou via des liens externes, les donnees sont egalement traitees par les services concernes selon leurs propres politiques.']],

          ['Aufbewahrung und Rechte', ['Technische Daten in Hosting-Protokollen werden so lange aufbewahrt, wie es fuer Sicherheit und Wartung erforderlich ist. Du kannst Auskunft ueber dich betreffende personenbezogene Daten sowie Berichtigung oder Loeschung verlangen, soweit dies anwendbar ist. Lokal gespeicherte Browserdaten kannst du ueber die Browsereinstellungen loeschen.']]
        ]
      }
    };

    function render(lang) {
      const data = copy[lang] || copy[fallback];
      document.documentElement.lang = lang;
      const meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute('content', data.meta);
      document.querySelector('[data-privacy-field="title"]').textContent = data.title;
      document.querySelector('[data-privacy-field="updated"]').textContent = data.updated;
      document.querySelector('[data-privacy-field="navBoutique"]').textContent = data.navBoutique;
      document.querySelector('[data-privacy-field="navContact"]').textContent = data.navContact;
      document.querySelector('[data-privacy-field="backLink"]').textContent = data.backLink;
      document.getElementById('privacyContent').innerHTML = data.sections.map(section => {
        return '<h2>' + section[0] + '</h2>' + section[1].map(p => '<p>' + p + '</p>').join('');
      }).join('');
      document.querySelectorAll('[data-privacy-lang] button').forEach(button => {
        button.classList.toggle('is-active', button.dataset.lang === lang);
      });
      try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
    }

    let initial = fallback;
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored && copy[stored]) initial = stored;
    } catch (e) {}
    if (initial === fallback) {
      const browser = (navigator.language || fallback).slice(0, 2).toLowerCase();
      if (copy[browser]) initial = browser;
    }
    document.querySelectorAll('[data-privacy-lang] button').forEach(button => {
      button.addEventListener('click', () => render(button.dataset.lang));
    });
    render(initial);
  })();
